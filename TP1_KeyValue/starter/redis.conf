# Redis configuration for TP1

# Autoriser les connexions réseau
bind 0.0.0.0

# Port Redis par défaut
port 6379

# Limite mémoire maximale
maxmemory 256mb

# Politique d'éviction :
# Supprime les clés les moins récemment utilisées
maxmemory-policy allkeys-lru

# Sauvegarde snapshot RDB
# Sauvegarder après 1 changement en 900 secondes
save 900 1

# Sauvegarder après 10 changements en 300 secondes
save 300 10

# Activer la persistance AOF
appendonly yes

# Synchronisation disque chaque seconde
appendfsync everysec
